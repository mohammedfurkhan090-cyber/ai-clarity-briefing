<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Clarity Briefing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI NEWS OPERATIONS</p>
          <h1>AI Clarity Briefing</h1>
        </div>
        <div class="actions">
          <button id="impactToggle" class="ghost-btn" type="button" aria-pressed="false">
            High impact only
          </button>
          <button id="refreshBtn" class="primary-btn" type="button">Refresh Briefing</button>
        </div>
      </header>

      <section class="brief-grid">
        <article class="panel top-brief">
          <div class="section-head">
            <p>Top Brief</p>
            <span id="modelBadge" class="badge">Gemini</span>
          </div>
          <p id="topSummary" class="summary-copy">Loading AI-organized briefing...</p>
          <div class="meta-row">
            <span id="lastUpdated">Loading...</span>
            <span id="cacheStatus">Cache pending</span>
          </div>
        </article>

        <article class="panel health-panel">
          <div class="section-head">
            <p>Source Health</p>
            <span id="aiStatus" class="badge">Checking</span>
          </div>
          <dl class="health-grid">
            <div>
              <dt>Feeds</dt>
              <dd id="feedCount">--</dd>
            </div>
            <div>
              <dt>Active</dt>
              <dd id="activeCount">--</dd>
            </div>
            <div>
              <dt>Items</dt>
              <dd id="itemCount">--</dd>
            </div>
            <div>
              <dt>Search</dt>
              <dd id="searchStatus">--</dd>
            </div>
          </dl>
          <p id="failedSources" class="health-note"></p>
        </article>
      </section>

      <section class="section">
        <div class="section-title">
          <div>
            <p class="eyebrow">MOVEMENT MAP</p>
            <h2>What Is Moving</h2>
          </div>
        </div>
        <div id="trendCards" class="trend-grid"></div>
      </section>

      <section class="section">
        <div class="section-title controls-title">
          <div>
            <p class="eyebrow">LATEST STORIES</p>
            <h2>Ranked Briefing Cards</h2>
          </div>
          <div id="categoryFilters" class="filter-row" aria-label="Category filters"></div>
        </div>
        <div id="storyCards" class="story-grid"></div>
      </section>
    </main>

    <template id="trendTemplate">
      <article class="trend-card">
        <div class="card-head">
          <span class="category-chip"></span>
          <span class="priority-pill"></span>
        </div>
        <h3></h3>
        <p></p>
        <span class="signal"></span>
      </article>
    </template>

    <template id="storyTemplate">
      <article class="story-card">
        <div class="card-head">
          <span class="category-chip"></span>
          <span class="priority-pill"></span>
        </div>
        <a class="story-title" target="_blank" rel="noopener noreferrer"></a>
        <p class="story-meta"></p>
        <p class="story-summary"></p>
        <div class="matter-block">
          <span>Why it matters</span>
          <p></p>
        </div>
        <div class="affected-row"></div>
        <div class="citation-row"></div>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
